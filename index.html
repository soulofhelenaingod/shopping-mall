<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obchodní Dům | Data-Driven Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        html { background-color: #0f172a; }
        body::before {
            content: ""; position: fixed; top: -10%; left: -10%;
            width: 120vw; height: 120vh; z-index: -1;
            background-image: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), url('pozadi.webp');
            background-size: cover; background-position: center; pointer-events: none;
        }
        .sphere-card {
            border-radius: 50%; aspect-ratio: 1 / 1;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; background: transparent;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sphere-card:hover { transform: scale(1.1) translateY(-4px); }
        .sphere-card img {
            width: 100%; height: 100%;
            object-fit: cover; object-position: center;
            transform: scale(1.23); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Selektory pro opravu velikostí */
        #grid-sfer > div:nth-child(10) img { transform: scale(1.28); }
        #grid-sfer > div:nth-child(16) img { transform: scale(1.15); }
        #grid-sfer > div:nth-child(19) img { transform: scale(1.28); }
        #grid-sfer > div:nth-child(20) img { transform: scale(1.28); }
        #grid-sfer > div:nth-child(27) img { transform: scale(1.28); }
        #grid-sfer > div:nth-child(28) img { transform: scale(1.05); }
    </style>
</head>
<body class="text-gray-100 min-h-screen font-sans flex flex-col justify-between m-0 p-0">
    <main class="max-w-7xl mx-auto px-4 py-8 w-full">
        <div id="grid-sfer" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8 gap-3 sm:gap-6 justify-items-center">
            <div class="text-gray-500 animate-pulse col-span-full text-center">Inicializace asynchronní datové pipeline...</div>
        </div>
    </main>
    <script>
        async function fetchAndRenderGrid() {
            const gridContainer = document.getElementById('grid-sfer');
            try {
                const response = await fetch('data.json');
                const prodejny = await response.json();
                gridContainer.innerHTML = '';
                prodejny.forEach(item => {
                    const wrapper = document.createElement('div');
                    wrapper.className = "flex flex-col items-center group w-20 sm:w-28 md:w-32";
                    // OPRAVA CESTY: načítání přímo (předpoklad dle screenshotu)
                    const imagePath = `${item.logo}`; 
                    wrapper.innerHTML = `
                        <a href="${item.link}" ${item.isInternal ? '' : 'target="_blank"'} class="sphere-card w-full">
                            <img src="${imagePath}" alt="${item.type}" class="${item.isInternal ? 'filter brightness-0 invert opacity-80 group-hover:opacity-100' : ''} transition-all">
                        </a>
                        <span class="mt-1 text-[10px] sm:text-sm font-semibold tracking-wide text-gray-200 text-center uppercase group-hover:text-amber-400 transition-colors duration-300 block w-full whitespace-normal break-words px-0.5 leading-tight" style="font-family: 'Inter', sans-serif; min-height: 2.5rem; display: flex; align-items: flex-start; justify-content: center;">
                            ${item.type}
                        </span>
                    `;
                    gridContainer.appendChild(wrapper);
                });
            } catch (error) { console.error('Pipeline Error:', error); }
        }
        document.addEventListener('DOMContentLoaded', fetchAndRenderGrid);
    </script>
</body>
</html>
