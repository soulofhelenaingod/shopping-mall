<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obchodní dům Hodonín</title>
  <style>
    /* ZÁKLADNÍ RESET A POZADÍ */
    body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-image: linear-gradient(rgba(26, 32, 44, 0.75), rgba(26, 32, 44, 0.75)), url('pozadi.webp');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: #ffffff;
    min-height: 100vh;
}

    /* KONTEJNER PRO MŘÍŽKU SFÉR */
    #mall-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 40px 20px;
      width: 100%;
      max-width: 1200px;
      padding: 40px;
      box-sizing: border-box;
    }

    /* ODKAZ A OBAL SFÉRY (BEZ POZADÍ A KRUHŮ) */
    .sphere-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #ffffff;
      background: transparent; /* Zásadní: žádné pozadí */
      border: none;
      outline: none;
      cursor: pointer;
    }

    /* SAMOTNÝ OBRÁZEK SFÉRY */
    .sphere-image {
      width: 140px;
      height: 140px;
      object-fit: contain;
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.3s ease;
      /* Přirozený stín pod 3D objektem ignorující průhledné pozadí .webp */
      filter: drop-shadow(0px 8px 12px rgba(0, 0, 0, 0.5));
    }

    /* EFEKT PO NAJETÍ MYŠÍ */
    .sphere-link:hover .sphere-image {
      transform: translateY(-8px) scale(1.05);
      filter: drop-shadow(0px 15px 20px rgba(0, 0, 0, 0.8));
    }

    /* TEXTOVÝ POPISEK POD SFÉROU */
    .sphere-label {
      margin-top: 15px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
      opacity: 0.8;
      transition: opacity 0.3s ease;
    }

    .sphere-link:hover .sphere-label {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div id="mall-grid"></div>

  <script>
    const gridContainer = document.getElementById('mall-grid');

    /* ➖ NAČÍTÁNÍ DAT ZE SAMOSTATNÉHO SOUBORU DATA.JSON */
    fetch('data.json')
      .then(response => response.json())
      .then(stores => {
        stores.forEach(store => {
          // Vytvoření odkazového obalu
          const anchor = document.createElement('a');
          anchor.className = 'sphere-link';
          anchor.href = store.link ? store.link : '#';
          
          // Otevření externích odkazů v novém okně
          if (store.link && !store.isInternal && store.link !== '#') {
            anchor.target = '_blank';
            anchor.rel = 'noopener noreferrer';
          }

          // Sestavení HTML obsahu s relativní cestou do složky assets/logos
          anchor.innerHTML = `
            <img src="assets/logos/${store.logo}" alt="Logo ${store.type}" class="sphere-image" loading="lazy">
            <span class="sphere-label">${store.type}</span>
          `;

          gridContainer.appendChild(anchor);
        });
      })
      .catch(error => console.error('Chyba při načítání JSON dat:', error));
  </script>
</body>
</html>
