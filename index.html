<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obchodní Dům</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Fixní pozadí s fotografií budovy */
        body {
            background-image: linear-gradient(rgba(17, 24, 39, 0.8), rgba(17, 24, 39, 0.8)), url('pozadi.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
        /* Efekt dokonalé 3D sféry generovaný čistě pomocí CSS stínů */
        .sphere-card {
            border-radius: 50%;
            aspect-ratio: 1 / 1;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0.8) 100%), #1f2937;
            box-shadow: 
                inset -5px -5px 15px rgba(0,0,0,0.8),
                inset 10px 10px 20px rgba(255,255,255,0.1),
                0 15px 25px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Animace a záření sféry při najetí myší */
        .sphere-card:hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: 
                inset -5px -5px 15px rgba(0,0,0,0.8),
                inset 10px 10px 25px rgba(255,255,255,0.2),
                0 20px 35px rgba(245,158,11,0.35); /* Jantarová zář */
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen font-sans flex flex-col justify-between">

    <main class="max-w-7xl mx-auto px-4 py-12 w-full">
        <header class="text-center mb-16">
            <h1 class="text-3xl md:text-5xl font-light tracking-widest text-white uppercase">Obchodní Dům</h1>
            <div class="h-0.5 w-24 bg-amber-500 mx-auto mt-4"></div>
        </header>

        <div id="grid-sfer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-8 justify-items-center">
            </div>
    </main>

    <footer class="w-full bg-gray-900/80 backdrop-blur-md py-6 text-center text-sm text-gray-400 border-t border-gray-800">
        <p>&copy; 2026 Obchodní Dům. Všechna práva vyhrazena. Zabezpečeno přes Cloudflare.</p>
    </footer>

    <script>
        // Seznam sférami upravený na jednoduché číslování obrázků 1 až 28
        const prodejny = [
            { nazev: "SUPERMARKET", logo: "1.png", odkaz: "https://www.albert.cz/nase-prodejny/supermarket-hodonin-masarykovo-nam" },
            { nazev: "CUKRÁRNA", logo: "2.png", odkaz: "https://www.facebook.com/hodonindelikana#" },
            { nazev: "RESTAURACE", logo: "3.jpg", odkaz: "https://www.poe-poe.cz/poe-poe-hodonin" },
            { nazev: "LÉKÁRNA", logo: "4.png", odkaz: "https://www.zdravi3v1.cz/contact-2/" },
            { nazev: "MÓDA", logo: "5.jpg", odkaz: "https://cz.coccodrillo.eu/" },
            { nazev: "MÓDA", logo: "6.png", odkaz: "https://www.vigossjeans.cz/" },
            { nazev: "DĚTSKÁ MÓDA", logo: "7.png", odkaz: "https://www.instagram.com/calzanatta?igsh=bGo2c3I2cmxzbmVh" },
            { nazev: "POSILOVNA", logo: "8.png", odkaz: "" },
            { nazev: "ALPINNING", logo: "9.jpg", odkaz: "https://www.facebook.com/AlpinningHodonin/?locale=cs_CZ" },
            { nazev: "SOLÁRIUM", logo: "10.png", odkaz: "https://puresun.cz/hodonin/" },
            { nazev: "NEHTY", logo: "11.jpg", odkaz: "https://www.facebook.com/people/Moon-Nails-Ateli%C3%A9r/61573249224680/" },
            { nazev: "SMĚNÁRNA", logo: "12.png", odkaz: "" },
            { nazev: "FINANCE", logo: "13.png", odkaz: "https://www.partnersbanka.cz/detail-pobocky/hodonin-masarykovo-nam" },
            { nazev: "FINANCE", logo: "14.png", odkaz: "https://www.4fin.cz/" },
            { nazev: "STAVEBNÍ SPOŘITELNA", logo: "15.jpg", odkaz: "https://www.banky.cz/banky/csob-stavebni-sporitelna/pobocky/masarykovo-nam-257-hodonin-69501/" },
            { nazev: "BANKOMAT", logo: "16.jpg", odkaz: "https://www.kb.cz/cs/pobocky-a-bankomaty/bankomaty/hodonin-masarykovo-nam" },
            { nazev: "ADVOKÁT", logo: "17.png", odkaz: "" },
            { nazev: "KATASTRÁLNÍ ÚŘAD", logo: "18.png", odkaz: "https://cuzk.gov.cz/kp/hodonin" },
            { nazev: "ŠPERKY", logo: "19.png", odkaz: "" },
            { nazev: "PPL BOX", logo: "20.png", odkaz: "https://www.ppl.cz/vydejni-mista/hodonin-masarykovo-namesti-16_4307977" },
            { nazev: "Z-BOX", logo: "21.png", odkaz: "https://www.zasilkovna.cz/pobocky/hodonin-masarykovo-namesti-257" },
            { nazev: "ALZA BOX", logo: "22.png", odkaz: "https://www.alza.cz/alzabox-hodonin-(iro-obchodni-dum)-1009355-ps.htm" },
            { nazev: "ALLEGRO BOX", logo: "23.png", odkaz: "https://onedelivery.cz/mapa-boxu-a-vydejnich-mist" },
            { nazev: "GLS BOX", logo: "24.png", odkaz: "https://ps-maps.gls-czech.cz/?tdetail=2&p=hodonin&header=0&lng=cs" },
            { nazev: "CBD", logo: "25.png", odkaz: "" },
            { nazev: "CBD", logo: "26.png", odkaz: "https://www.facebook.com/cbdhempbox" },
            // Navigační sféry na druhou stránku
            { nazev: "INFORMACE", logo: "27.png", odkaz: "pronajem.html#kontakt", interní: true },
            { nazev: "VOLNÉ PROSTORY", logo: "28.png", odkaz: "pronajem.html", interní: true }
        ];

        const gridContainer = document.getElementById('grid-sfer');

        prodejny.forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = "flex flex-col items-center group w-32 sm:w-40";
            let innerHTML = '';
            
            if (item.interní) {
                // Navigační 3D sféry (zlatavý nádech pro odlišení)
                innerHTML = `
                    <a href="${item.odkaz}" class="sphere-card w-full border border-amber-500/20 hover:border-amber-400">
                        <img src="${item.logo}" alt="${item.nazev}" class="w-1/2 h-1/2 object-contain filter brightness-0 invert opacity-80 group-hover:opacity-100">
                    </a>
                `;
            } else if (item.odkaz) {
                // Aktivní klikací 3D sféry obchodů
                innerHTML = `
                    <a href="${item.odkaz}" target="_blank" rel="noopener noreferrer" class="sphere-card w-full border border-gray-700/50 hover:border-gray-500">
                        <img src="${item.logo}" alt="${item.nazev}" class="w-1/2 h-1/2 object-contain group-hover:scale-105 transition-transform">
                    </a>
                `;
            } else {
                // Neaktivní 3D sféry pro obchody bez odkazu (jemně ztmavené)
                innerHTML = `
                    <div class="sphere-card w-full border border-gray-800/30 opacity-50 cursor-default">
                        <img src="${item.logo}" alt="${item.nazev}" class="w-1/2 h-1/2 object-contain grayscale">
                    </div>
                `;
            }

            innerHTML += `
                <span class="mt-4 text-xs sm:text-sm font-medium tracking-widest text-gray-400 text-center uppercase group-hover:text-white transition-colors duration-300">
                    ${item.nazev}
                </span>
            `;

            wrapper.innerHTML = innerHTML;
            gridContainer.appendChild(wrapper);
        });
    </script>
</body>
</html>
