<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obchodní Dům | Data-Driven Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-image: linear-gradient(rgba(17, 24, 39, 0.8), rgba(17, 24, 39, 0.8)), url('pozadi.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
        .sphere-card {
            border-radius: 50%;
            aspect-ratio: 1 / 1;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0.8) 100%), #1f2937;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.8), inset 10px 10px 20px rgba(255,255,255,0.1), 0 15px 25px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sphere-card:hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.8), inset 10px 10px 25px rgba(255,255,255,0.2), 0 20px 35px rgba(245,158,11,0.35);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen font-sans flex flex-col justify-between">

    <main class="max-w-7xl mx-auto px-4 py-12 w-full">
        <header class="text-center mb-16">
            <h1 class="text-3xl md:text-5xl font-light tracking-widest text-white uppercase">Obchodní Dům</h1>
            <p class="text-xs text-gray-500 tracking-widest uppercase mt-2">Data-driven Static Architecture</p>
            <div class="h-0.5 w-24 bg-amber-500 mx-auto mt-4"></div>
        </header>

        <div id="grid-sfer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-8 justify-items-center">
            <div class="text-gray-500 animate-pulse col-span-full">Inicializace asynchronní datové pipeline...</div>
        </div>
    </main>

    <footer class="w-full bg-gray-900/80 backdrop-blur-md py-6 text-center text-sm text-gray-400 border-t border-gray-800">
        <p>&copy; 2026 Obchodní Dům. Cloudflare-Optimized Static Pipeline.</p>
    </footer>

    <script>
        async function fetchAndRenderGrid() {
            const gridContainer = document.getElementById('grid-sfer');
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Chyba při inicializaci síťového požadavku.');
                
                const prodejny = await response.json();
                gridContainer.innerHTML = '';

                prodejny.forEach(item => {
                    const wrapper = document.createElement('div');
                    wrapper.className = "flex flex-col items-center group w-32 sm:w-40";
                    let innerHTML = '';
                    
                    if (item.isInternal) {
                        innerHTML = `
                            <a href="${item.link}" class="sphere-card w-full border border-amber-500/20 hover:border-amber-400">
                                <img src="${item.logo}" alt="${item.type}" class="w-1/2 h-1/2 object-contain filter brightness-0 invert opacity-80 group-hover:opacity-100">
                            </a>
                        `;
                    } else if (item.link) {
                        innerHTML = `
                            <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="sphere-card w-full border border-gray-700/50 hover:border-gray-500">
                                <img src="${item.logo}" alt="${item.type}" class="w-1/2 h-1/2 object-contain group-hover:scale-105 transition-transform">
                            </a>
                        `;
                    } else {
                        innerHTML = `
                            <div class="sphere-card w-full border border-gray-800/30 opacity-50 cursor-default">
                                <img src="${item.logo}" alt="${item.type}" class="w-1/2 h-1/2 object-contain grayscale">
                            </div>
                        `;
                    }

                    innerHTML += `
                        <span class="mt-4 text-xs sm:text-sm font-medium tracking-widest text-gray-400 text-center uppercase group-hover:text-white transition-colors duration-300">
                            ${item.type}
                        </span>
                    `;

                    wrapper.innerHTML = innerHTML;
                    gridContainer.appendChild(wrapper);
                });
            } catch (error) {
                console.error('Data Pipeline Error:', error);
                gridContainer.innerHTML = `<div class="text-red-400 col-span-full text-center">Chyba datového streamu: ${error.message}</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', fetchAndRenderGrid);

        // SECURE LAYER: Ochrana před inspekcí kódu na klientské straně
        // Zakáže pravé tlačítko myši
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Zakáže klávesové zkratky F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
        document.addEventListener('keydown', e => {
            if (
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                (e.ctrlKey && e.key === 'U')
            ) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
